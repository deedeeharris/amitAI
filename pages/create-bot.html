<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יצירת מלווה חדש - מחולל מלווי למידה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/create-bot.css">

    <link rel="stylesheet" href="../styles/components/data-sources-modal.css">
    <link rel="stylesheet" href="../styles/components/prompt-generator.css">
    <link rel="stylesheet" href="../styles/components/bot-preview.css">
    <link rel="stylesheet" href="../styles/components/file-upload.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <h1>מחולל מלווי למידה - רשת אמית</h1>
            <nav class="main-nav">
                <ul class="nav-buttons">
                    <li><a href="../index.html" class="nav-button">
                        <i class="fas fa-home"></i>
                        דף הבית
                    </a></li>
                    <li><a href="library.html" class="nav-button">
                        <i class="fas fa-book-open"></i>
                        ספריית מלווים
                    </a></li>
                    <li><a href="my-bots.html" class="nav-button">
                        <i class="fas fa-robot"></i>
                        המלווים שלי
                    </a></li>
                </ul>
            </nav>
        </header>

        <main class="main-content">
            <form id="create-bot-form" class="creation-wizard">
                <!-- Step Indicators -->
                <div class="step-indicators">
                    <div class="step active" data-step="1">
                        <span class="step-number">1</span>
                        <span class="step-title">פרטים בסיסיים</span>
                    </div>
                    <div class="step" data-step="2">
                        <span class="step-number">2</span>
                        <span class="step-title">מקורות מידע</span>
                    </div>
                    <div class="step" data-step="3">
                        <span class="step-number">3</span>
                        <span class="step-title">אישיות המלווה</span>
                    </div>
                    <div class="step" data-step="4">
                        <span class="step-number">4</span>
                        <span class="step-title">תצוגה מקדימה</span>
                    </div>
                    <div class="step" data-step="5">
                        <span class="step-number">5</span>
                        <span class="step-title">הפצה</span>
                    </div>
                </div>

                <div class="wizard-content">
                    <!-- Step 1: Basic Information -->
                    <div class="step-content-item active" data-step="1">
                        <div class="form-section">
                            <h2>פרטים בסיסיים</h2>
                            <div class="form-group">
                                <label for="bot-name">שם המלווה</label>
                                <input type="text" id="bot-name" name="bot-name">
                            </div>
                            <div class="form-group">
                                <label for="subject-area">תחום לימוד</label>
                                <select id="subject-area" name="subject-area">
                                    <option value="">בחר תחום</option>
                                    <option value="math">מתמטיקה</option>
                                    <option value="science">מדעים</option>
                                    <option value="history">היסטוריה</option>
                                    <option value="literature">ספרות</option>
                                    <option value="english">אנגלית</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="grade-level">שכבת גיל</label>
                                <select id="grade-level" name="grade-level">
                                    <option value="">בחר שכבה</option>
                                    <option value="elementary">יסודי</option>
                                    <option value="middle">חטיבת ביניים</option>
                                    <option value="high">תיכון</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="bot-description">תיאור המלווה</label>
                                <textarea id="bot-description" name="bot-description" rows="4"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: Data Sources -->
                    <div class="step-content-item" data-step="2">
                        <div class="form-section">
                            <h2>מקורות מידע</h2>
                            <div class="form-group">
                                <label>העלאת קבצים</label>
                                <div class="upload-zone">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <p>גרור קבצים לכאן או לחץ להעלאה</p>
                                    <input type="file" multiple hidden>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 3: Personality -->
                    <div class="step-content-item" data-step="3">
                        <div class="form-section">
                            <h2>אישיות המלווה</h2>
                            <div class="form-group">
                                <label for="personality-type">סגנון אישיות</label>
                                <select id="personality-type" name="personality-type">
                                    <option value="">בחר סגנון</option>
                                    <option value="friendly">ידידותי ומעודד</option>
                                    <option value="professional">מקצועי ורשמי</option>
                                    <option value="casual">קליל ונגיש</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Step 4: Preview -->
                    <div class="step-content-item" data-step="4">
                        <div class="form-section">
                            <h2>תצוגה מקדימה</h2>
                            <div class="preview-pane">
                                <div class="chat-preview">
                                    <!-- Chat preview will be here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 5: Deployment -->
                    <div class="step-content-item" data-step="5">
                        <div class="form-section">
                            <h2>הפצה</h2>
                            <div class="form-group">
                                <label for="deployment-type">סוג הפצה</label>
                                <select id="deployment-type" name="deployment-type">
                                    <option value="">בחר סוג הפצה</option>
                                    <option value="website">אתר אינטרנט</option>
                                    <option value="app">אפליקציה</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="step-navigation">
                    <button type="button" class="prev-step" disabled>
                        <i class="fas fa-arrow-right"></i>
                        הקודם
                    </button>
                    <button type="button" class="next-step">
                        הבא
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="../js/debug.js"></script>
    <script type="module" src="../js/wizard-navigation.js"></script>
    <script type="module" src="../js/components/steps.js"></script>
    <script type="module" src="../js/components/file-upload.js"></script>
    <script type="module" src="../js/components/form-validation.js"></script>
    <script type="module" src="../js/pages/create-bot.js"></script>
    <script type="module" src="../js/init.js"></script>
</body>
</html>
