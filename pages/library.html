<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספריית מלווים - מחולל מלווי למידה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/library.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <h1>מחולל מלווי למידה - רשת אמית</h1>
            <nav class="main-nav">
                <div class="nav-buttons">
                    <a href="../index.html" class="nav-button">
                        <i class="fas fa-home"></i>
                        דף הבית
                    </a>
                    <a href="my-bots.html" class="nav-button">
                        <i class="fas fa-robot"></i>
                        המלווים שלי
                    </a>
                    <a href="create-bot.html" class="nav-button primary">
                        <i class="fas fa-plus-circle"></i>
                        יצירת מלווה למידה חדש
                    </a>
                </div>
            </nav>
        </header>

        <main class="library-container">
            <!-- Search and Filters -->
            <div class="search-section">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="חיפוש מלווים...">
                    <button class="search-button">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div class="filters">
                    <select class="filter-select" id="subject-filter">
                        <option value="">כל הנושאים</option>
                        <option value="math">מתמטיקה</option>
                        <option value="science">מדעים</option>
                        <option value="history">היסטוריה</option>
                        <option value="literature">ספרות</option>
                        <option value="english">אנגלית</option>
                    </select>
                    <select class="filter-select" id="grade-filter">
                        <option value="">כל השכבות</option>
                        <option value="elementary">יסודי</option>
                        <option value="middle">חטיבת ביניים</option>
                        <option value="high">תיכון</option>
                    </select>
                    <div class="sort-options">
                        <label>מיון לפי:</label>
                        <select id="sort-select">
                            <option value="newest">חדש ביותר</option>
                            <option value="popular">פופולרי ביותר</option>
                            <option value="rating">דירוג</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Bot Grid -->
            <div class="bot-grid" id="bot-grid">
                <!-- Bots will be dynamically inserted here -->
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <button class="page-button" id="prev-page">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <div class="page-numbers" id="page-numbers">
                    <!-- Page numbers will be dynamically inserted here -->
                </div>
                <button class="page-button" id="next-page">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/common/config.js"></script>
    <script src="../js/common/api.js"></script>
    <script src="../js/common/utils.js"></script>
    <script src="../js/components/botCard.js"></script>
    <script src="../js/pages/library.js"></script>
</body>
</html>
